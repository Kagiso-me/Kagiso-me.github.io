name: Fetch Live Data

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch and commit live data
    runs-on: [self-hosted, linux, homelab, bran-site]

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}

      - name: Fetch live data from cluster
        env:
          SONARR_API_KEY:    ${{ secrets.SONARR_API_KEY }}
          RADARR_API_KEY:    ${{ secrets.RADARR_API_KEY }}
          SABNZBD_API_KEY:   ${{ secrets.SABNZBD_API_KEY }}
          LIDARR_API_KEY:    ${{ secrets.LIDARR_API_KEY }}
          NAVIDROME_USER:    ${{ secrets.NAVIDROME_USER }}
          NAVIDROME_PASS:    ${{ secrets.NAVIDROME_PASS }}
          PLEX_TOKEN:        ${{ secrets.PLEX_TOKEN }}
          MIKROTIK_HOST:     ${{ secrets.MIKROTIK_HOST }}
          MIKROTIK_USER:     ${{ secrets.MIKROTIK_USER }}
          MIKROTIK_PASS:     ${{ secrets.MIKROTIK_PASS }}
          PIHOLE_PASSWORD:   ${{ secrets.PIHOLE_PASSWORD }}
          TRUENAS_API_KEY:   ${{ secrets.TRUENAS_API_KEY }}
          IMMICH_API_KEY:    ${{ secrets.IMMICH_API_KEY }}
          NEXTCLOUD_USER:    ${{ secrets.NEXTCLOUD_USER }}
          NEXTCLOUD_PASS:    ${{ secrets.NEXTCLOUD_PASS }}
        run: |
          bash scripts/fetch-live-data.sh > public/data/live.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/live.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(data): update live cluster data"
          git pull --rebase
          git push

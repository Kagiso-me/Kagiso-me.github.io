<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="am-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fc5c7d"/>
      <stop offset="100%" stop-color="#6a3093"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#am-grad)"/>
  <!-- Music note -->
  <g fill="#ffffff">
    <!-- Note head 1 -->
    <ellipse cx="75" cy="138" rx="18" ry="13" transform="rotate(-15 75 138)"/>
    <!-- Note head 2 -->
    <ellipse cx="135" cy="122" rx="18" ry="13" transform="rotate(-15 135 122)"/>
    <!-- Stem and beam -->
    <rect x="90" y="62" width="8" height="78" rx="4"/>
    <rect x="90" y="62" width="57" height="8" rx="4"/>
    <rect x="143" y="62" width="8" height="62" rx="4"/>
  </g>
</svg>

name: Fetch CVE Data

on:
  schedule:
    - cron: '0 6 * * *'    # 08:00 SAST daily
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch CVEs from OSV.dev
    runs-on: [self-hosted, linux, homelab, bran-site]

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}

      - name: Fetch CVE data
        env:
          DISCORD_CVE_WEBHOOK: "https://discord.com/api/webhooks/1495109691393577131/oqu26VRzLkNSIMop7VwoodHyI81WxqzF_GhkL01I0UIRYC8ioXcGn0mCcWO3b7n7J1bO"
        run: python3 scripts/fetch-cves.py > public/data/cve.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/cve.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(data): update CVE feed"
          git pull --rebase
          git push

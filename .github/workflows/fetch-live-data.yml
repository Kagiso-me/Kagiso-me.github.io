name: Fetch Live Data

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch and commit live data
    runs-on: [self-hosted, linux, homelab]

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}

      - name: Fetch live data from cluster
        env:
          SONARR_API_KEY: ${{ secrets.SONARR_API_KEY }}
          RADARR_API_KEY: ${{ secrets.RADARR_API_KEY }}
          SABNZBD_API_KEY: ${{ secrets.SABNZBD_API_KEY }}
        run: |
          bash scripts/fetch-live-data.sh > public/data/live.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/live.json
          git diff --staged --quiet || git commit -m "chore(data): update live cluster data [skip ci]"
          git push

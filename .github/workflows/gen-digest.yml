name: Generate Digest

on:
  schedule:
    - cron: '15 * * * *'   # every hour, offset from fetch-live-data
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/gen-digest.sh'

jobs:
  generate:
    name: Generate digest from changelog
    runs-on: [self-hosted, linux, homelab, bran-site]

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Kagiso-me/homelab-infrastructure
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}
          path: infra

      - name: Generate digest.json
        run: |
          INFRA_DIR=infra bash scripts/gen-digest.sh > public/data/digest.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/digest.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(data): regenerate digest [skip ci]"
          git pull --rebase
          git push
